# 数据输出目录
data_root = "../data"

# 默认时区，同时用于 Open-Meteo 查询和本地日期计算
timezone = "Asia/Shanghai"

# 请求超时和请求间隔
request_timeout_seconds = 60
request_sleep_seconds = 0.2

# 预报跨度
forecast_days = 16

# 历史天气预报快照回填时的时间间隔，单位小时
forecast_snapshot_backfill_interval_hours = 6

# 历史实况天气回填时的分块天数
actual_backfill_chunk_days = 30

# 没有历史水位时，首次自动补最近多少天的实况天气
actual_lookback_days_if_empty = 7

# 实时预报快照的最小抓取间隔，单位分钟；为 0 表示不限制
min_forecast_interval_minutes = 0

hourly_variables = [
  "temperature_2m",
  "relative_humidity_2m",
  "dew_point_2m",
  "apparent_temperature",
  "precipitation",
  "rain",
  "showers",
  "snowfall",
  "precipitation_probability",
  "weather_code",
  "cloud_cover",
  "surface_pressure",
  "wind_speed_10m",
  "wind_direction_10m",
  "wind_gusts_10m",
  "shortwave_radiation",
]

daily_variables = [
  "temperature_2m_max",
  "temperature_2m_min",
  "precipitation_sum",
  "wind_speed_10m_max",
  "sunrise",
  "sunset",
]

