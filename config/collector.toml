# Data output directory
data_root = "../data"

# Default timezone used for API queries and local calendar calculations
timezone = "Asia/Shanghai"

# HTTP request controls
request_timeout_seconds = 60
request_sleep_seconds = 0.2
historical_forecast_request_sleep_seconds = 3.0

# Forecast settings
forecast_days = 16
forecast_snapshot_backfill_default_start_date = "2026-01-01"
forecast_snapshot_backfill_interval_hours = 168
forecast_snapshot_window_interval_hours = 6

# Actual backfill settings
actual_backfill_chunk_days = 30
actual_lookback_days_if_empty = 7

# Real-time forecast sampling guard. 0 disables the guard.
min_forecast_interval_minutes = 0

hourly_variables = [
  "temperature_2m",
  "relative_humidity_2m",
  "dew_point_2m",
  "apparent_temperature",
  "precipitation",
  "rain",
  "showers",
  "snowfall",
  "precipitation_probability",
  "weather_code",
  "cloud_cover",
  "surface_pressure",
  "wind_speed_10m",
  "wind_direction_10m",
  "wind_gusts_10m",
  "shortwave_radiation",
]

daily_variables = [
  "temperature_2m_max",
  "temperature_2m_min",
  "precipitation_sum",
  "wind_speed_10m_max",
  "sunrise",
  "sunset",
]

